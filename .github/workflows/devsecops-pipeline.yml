# ══════════════════════════════════════════════════════════════
# DevSecOps CI/CD Pipeline
# ══════════════════════════════════════════════════════════════
# Implements "Shift Left" security with 5 automated gates:
#   1. Hadolint   — Dockerfile best practices
#   2. Trivy      — Container image CVE scanning
#   3. Checkov    — Kubernetes IaC scanning
#   4. Conftest   — OPA custom policy enforcement
#   5. Deploy     — Only if all gates pass
# ══════════════════════════════════════════════════════════════

name: DevSecOps Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: devsecops-app
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  security-events: write

jobs:
  # ────────────────────────────────────────────
  # Stage 1: Lint Dockerfile with Hadolint
  # ────────────────────────────────────────────
  lint-dockerfile:
    name: "🔍 Gate 1: Dockerfile Lint (Hadolint)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: warning
          format: json
          output-file: hadolint-report.json

      - name: Upload Hadolint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-report
          path: hadolint-report.json
          retention-days: 30

      - name: Display Hadolint Results
        if: always()
        run: |
          echo "══════════════════════════════════════════"
          echo "  HADOLINT DOCKERFILE ANALYSIS RESULTS"
          echo "══════════════════════════════════════════"
          if [ -f hadolint-report.json ]; then
            cat hadolint-report.json | head -100
          fi
          echo ""
          echo "✅ Hadolint gate passed — Dockerfile follows best practices"

  # ────────────────────────────────────────────
  # Stage 2: Build Docker Image
  # ────────────────────────────────────────────
  build-image:
    name: "🏗️ Build Docker Image"
    runs-on: ubuntu-latest
    needs: lint-dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Save Docker image as artifact
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o docker-image.tar
          echo "Image size: $(du -sh docker-image.tar | cut -f1)"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar
          retention-days: 1

  # ────────────────────────────────────────────
  # Stage 3: Vulnerability Scan with Trivy
  # ────────────────────────────────────────────
  scan-image:
    name: "🛡️ Gate 2: CVE Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i docker-image.tar

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-

      - name: Run Trivy vulnerability scan (JSON Report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: "json"
          output: "trivy-report.json"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report
          path: trivy-report.json
          retention-days: 90

      - name: Display Trivy Summary
        if: always()
        run: |
          echo "══════════════════════════════════════════"
          echo "  TRIVY VULNERABILITY SCAN RESULTS"
          echo "══════════════════════════════════════════"
          if [ -f trivy-report.json ]; then
            echo "Full report saved as pipeline artifact."
            echo ""
            # Count vulnerabilities by severity
            HIGH_COUNT=$(cat trivy-report.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' 2>/dev/null || echo "0")
            CRITICAL_COUNT=$(cat trivy-report.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' 2>/dev/null || echo "0")
            echo "  HIGH vulnerabilities:     $HIGH_COUNT"
            echo "  CRITICAL vulnerabilities: $CRITICAL_COUNT"
            echo ""
          fi

      - name: Run Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

  # ────────────────────────────────────────────
  # Stage 4: IaC Scanning with Checkov
  # ────────────────────────────────────────────
  scan-iac:
    name: "📋 Gate 3: IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Kubernetes manifests
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          output_format: cli,json
          output_file_path: console,checkov-report.json
          quiet: true
          soft_fail: false
          skip_check: CKV_K8S_43,CKV2_K8S_6

      - name: Upload Checkov Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-iac-report
          path: checkov-report.json
          retention-days: 90

      - name: Display Checkov Summary
        if: always()
        run: |
          echo "══════════════════════════════════════════"
          echo "  CHECKOV IaC SCAN RESULTS"
          echo "══════════════════════════════════════════"
          if [ -f checkov-report.json ]; then
            echo "Full report saved as pipeline artifact."
            PASSED=$(cat checkov-report.json | jq '.results.passed_checks | length' 2>/dev/null || echo "N/A")
            FAILED=$(cat checkov-report.json | jq '.results.failed_checks | length' 2>/dev/null || echo "N/A")
            echo "  Passed checks: $PASSED"
            echo "  Failed checks: $FAILED"
          fi
          echo ""
          echo "✅ Checkov gate passed — K8s manifests are secure"

  # ────────────────────────────────────────────
  # Stage 5: Policy Enforcement with OPA/Conftest
  # ────────────────────────────────────────────
  enforce-policies:
    name: "⚖️ Gate 4: Policy Enforcement (OPA)"
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          CONFTEST_VERSION="0.46.0"
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Run OPA policy checks on Kubernetes manifests
        run: |
          echo "══════════════════════════════════════════"
          echo "  OPA POLICY ENFORCEMENT RESULTS"
          echo "══════════════════════════════════════════"
          echo ""
          echo "Policies being enforced:"
          echo "  1. Registry Restriction (trusted-registry.company.com)"
          echo "  2. Resource Limits Enforcement (CPU & Memory)"
          echo "  3. Mandatory Labels (cost-center)"
          echo ""

          # Run conftest against all K8s manifests
          conftest test k8s/*.yaml -p policies/ --all-namespaces

          echo ""
          echo "✅ All OPA policies passed — manifests comply with organizational policies"

      - name: Verify individual policies
        run: |
          echo "── Verifying Registry Policy ──"
          conftest test k8s/deployment.yaml -p policies/registry.rego

          echo ""
          echo "── Verifying Resource Limits Policy ──"
          conftest test k8s/deployment.yaml -p policies/resources.rego

          echo ""
          echo "── Verifying Mandatory Labels Policy ──"
          conftest test k8s/deployment.yaml -p policies/labels.rego
          conftest test k8s/service.yaml -p policies/labels.rego
          conftest test k8s/namespace.yaml -p policies/labels.rego

  # ────────────────────────────────────────────
  # Stage 6: Deploy (only if all gates pass)
  # ────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: [scan-image, scan-iac, enforce-policies]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deployment Summary
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  DEPLOYMENT AUTHORIZED — ALL SECURITY GATES PASSED"
          echo "══════════════════════════════════════════════════════"
          echo ""
          echo "  ✅ Gate 1: Hadolint     — Dockerfile lint passed"
          echo "  ✅ Gate 2: Trivy        — No HIGH/CRITICAL CVEs"
          echo "  ✅ Gate 3: Checkov      — K8s manifests secure"
          echo "  ✅ Gate 4: OPA/Conftest — All policies compliant"
          echo ""
          echo "  Image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Actor:  ${{ github.actor }}"
          echo ""
          echo "  ⚠️  Deployment to production cluster would execute here."
          echo "  In a real environment, this step would:"
          echo "    1. Push the image to the trusted registry"
          echo "    2. Update the K8s manifests with the new image tag"
          echo "    3. Apply manifests to the production cluster"
          echo "    4. Verify deployment rollout status"
          echo "══════════════════════════════════════════════════════"

  # ────────────────────────────────────────────
  # Pipeline Summary
  # ────────────────────────────────────────────
  security-summary:
    name: "📊 Security Summary"
    runs-on: ubuntu-latest
    needs: [lint-dockerfile, scan-image, scan-iac, enforce-policies]
    if: always()
    steps:
      - name: Security Pipeline Summary
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  DevSecOps PIPELINE SECURITY SUMMARY"
          echo "══════════════════════════════════════════════════════"
          echo ""
          echo "  Pipeline Run: #${{ github.run_number }}"
          echo "  Commit:       ${{ github.sha }}"
          echo "  Branch:       ${{ github.ref_name }}"
          echo "  Triggered by: ${{ github.event_name }}"
          echo ""
          echo "  Security Gates:"
          echo "  ─────────────────────────────────────────────────"
          echo "  Gate 1 (Hadolint):     ${{ needs.lint-dockerfile.result }}"
          echo "  Gate 2 (Trivy):        ${{ needs.scan-image.result }}"
          echo "  Gate 3 (Checkov):      ${{ needs.scan-iac.result }}"
          echo "  Gate 4 (OPA/Conftest): ${{ needs.enforce-policies.result }}"
          echo "  ─────────────────────────────────────────────────"
          echo ""
          echo "  Artifacts generated:"
          echo "    • hadolint-report.json"
          echo "    • trivy-vulnerability-report.json"
          echo "    • checkov-iac-report.json"
          echo "══════════════════════════════════════════════════════"
